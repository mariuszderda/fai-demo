services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fai-backend
    env_file:
      - .env.production
    volumes:
      - ./runtime:/app/runtime
      - ./data:/app/data:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8080/healthz\", timeout=3).read()'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: fai-frontend-build
    volumes:
      - frontend-build:/output
    healthcheck:
      test: ["CMD-SHELL", "test -f /output/index.html"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  nginx:
    image: nginx:alpine
    container_name: fai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/:/etc/nginx/conf.d/:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - frontend-build:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  frontend-build:

