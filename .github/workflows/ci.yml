name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e .[dev]
      - name: Bootstrap MITRE dataset
        run: bash scripts/bootstrap.sh
      - name: Lint backend
        run: |
          cd backend
          ruff check fai/
      - name: Type-check backend
        run: |
          cd backend
          mypy fai/
      - name: Test backend
        run: |
          cd backend
          pytest -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Type-check frontend
        run: |
          cd frontend
          npm run typecheck
      - name: Build frontend
        run: |
          cd frontend
          npm run build

