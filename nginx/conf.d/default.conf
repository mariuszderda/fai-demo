server {
    listen 80;
    server_name fai.mariuszderda.pl;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name fai.mariuszderda.pl;
    ssl_certificate /etc/letsencrypt/live/fai.mariuszderda.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fai.mariuszderda.pl/privkey.pem;

    # SSE stream endpoints only (regex, highest priority for these URLs)
    location ~ ^/api/v1/incidents/[0-9a-f-]+/stream$ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # All API and mock requests
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mock/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # Frontend SPA (fallback)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

